# CAS 6.x：必须同时设置「JSON 目录」+「从 JSON 初始化」
# 仅 cas.service-registry.json.location 不够；init-from-json 默认为 false，会导致 0 个已注册服务 → Application Not Authorized
# 官方属性名见：https://apereo.github.io/cas/development/services/JSON-Service-Management.html
cas.service-registry.json.location=file:/etc/cas/services/
cas.service-registry.core.init-from-json=true
# 不混入 WAR 内默认示例（避免与自定义 JSON 的 id 冲突）；若仍 0 条服务可改为 true 排查
cas.service-registry.core.init-default-services=false
