/var/log/eido/app/uvicorn-stdout.log
/var/log/eido/app/uvicorn-stderr.log
{
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y-%m-%d
}

/var/log/eido/litellm/litellm-stdout.log
/var/log/eido/litellm/litellm-stderr.log
{
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y-%m-%d
}

/var/log/eido/nginx/access.log
/var/log/eido/nginx/error.log
{
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    dateext
    dateformat -%Y-%m-%d
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}
