server {
    listen 80;
    server_name localhost;

    access_log /var/log/eido/nginx/access.log;
    error_log /var/log/eido/nginx/error.log;

    location /ai-eido/api {
        rewrite ^/ai-eido/api(.*)$ /api$1 break;

        proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Accel-Buffering no;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_cache off;

        client_max_body_size 10M;
    }

    location /ai-eido/health {
        rewrite ^/ai-eido/health$ /health break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai-eido {
        root /var/www;
        index index.html;
        try_files $uri $uri/ /ai-eido/index.html;
    }

    location = / {
        return 301 $scheme://$http_host/ai-eido;
    }
}
