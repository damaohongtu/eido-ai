# AI Research 项目 Nginx 配置
# 所有服务通过 /ai-eido 前缀访问

server {
    listen 80;
    server_name localhost;  # 请根据实际域名修改

    # 访问日志和错误日志
    access_log /var/log/nginx/ai-eido-access.log;
    error_log /var/log/nginx/ai-eido-error.log;

    # 前端静态文件服务（添加 /ai-eido 前缀）
    location /ai-eido {
        # 前端构建后的静态文件目录
        alias /var/www/ai-eido/frontend/dist;
        index index.html;
        
        # 尝试直接访问文件，如果不存在则返回 index.html（支持前端路由）
        try_files $uri $uri/ /ai-eido/index.html;
        
        # 静态文件缓存配置
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /var/www/ai-eido/frontend/dist;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 代理（添加 /ai-eido/api 前缀）
    location /ai-eido/api {
        # 完全移除 /ai-eido/api 前缀，转发到后端
        rewrite ^/ai-eido/api(.*)$ $1 break;
        
        # 代理到后端服务
        proxy_pass http://localhost:8000;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE 流式传输配置（关键！）
        proxy_http_version 1.1;
        proxy_set_header Connection "";           # 改这里：空字符串，不是 "upgrade"
        proxy_set_header X-Accel-Buffering no;    # 新增：禁用加速缓冲
        
        # 超时设置（用于长连接和流式响应）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 禁用缓冲（重要：用于流式响应）
        proxy_buffering off;
        proxy_cache off;
        
        # 允许大的请求体
        client_max_body_size 10M;
    }

    # 后端健康检查端点
    location /ai-eido/health {
        rewrite ^/ai-eido/health$ /health break;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 根路径重定向到 /ai-eido
    location = / {
        return 301 /ai-eido;
    }
}

